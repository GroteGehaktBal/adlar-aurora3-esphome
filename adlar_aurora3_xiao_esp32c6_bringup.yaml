---
# Minimal first-contact firmware for an Adlar Aurora III / Castra Aurora III Pro
# through the JÅN module RS485 Modbus RTU terminals.
#
# Purpose:
# - Prove that the XIAO is running the expected firmware.
# - Probe the two most likely Aurora III slave IDs while debugging wiring/protocol.
# - Avoid a burst of timeouts from the full register map.

substitutions:
  name: adlar-aurora3
  friendly_name: Adlar Aurora III
  firmware_profile: "bring-up 0.3.1 - 9600 8N2 - slave 1 and 251 probe"
  modbus_update_interval: 60s
  modbus_command_throttle: 1000ms
  modbus_send_wait_time: 500ms

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: "Adlar Aurora III JÅN RS485 Modbus bring-up profile"
  project:
    name: grotegehaktbal.adlar_aurora3_esphome
    version: "0.3.1-bringup"

dashboard_import:
  package_import_url: github://GroteGehaktBal/adlar-aurora3-esphome/adlar_aurora3_xiao_esp32c6_bringup.yaml@main
  import_full_config: true

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "${friendly_name} fallback"
    password: !secret fallback_ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO
  baud_rate: 0

web_server:
  port: 80
  version: 3
  sorting_groups:
    - id: group_diagnostics
      name: Diagnostics
      sorting_weight: 10
    - id: group_modbus
      name: Modbus Bring-Up
      sorting_weight: 20

button:
  - platform: restart
    name: "Restart ESP"
    entity_category: diagnostic

uart:
  id: uart_rs485
  tx_pin: D6
  rx_pin: D7
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 2

modbus:
  id: modbus_rs485
  uart_id: uart_rs485
  send_wait_time: ${modbus_send_wait_time}

modbus_controller:
  - id: aurora3_slave_1
    modbus_id: modbus_rs485
    address: 1
    command_throttle: ${modbus_command_throttle}
    setup_priority: -10
    update_interval: ${modbus_update_interval}

  - id: aurora3_slave_251
    modbus_id: modbus_rs485
    address: 251
    command_throttle: ${modbus_command_throttle}
    setup_priority: -10
    update_interval: ${modbus_update_interval}

binary_sensor:
  - platform: status
    name: "ESP online"
    entity_category: diagnostic

sensor:
  - platform: wifi_signal
    name: "ESP WiFi signal"
    update_interval: 60s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics

  - platform: uptime
    name: "ESP uptime"
    update_interval: 60s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics

  - platform: modbus_controller
    modbus_controller_id: aurora3_slave_1
    id: bringup_slave_1_system_status_bits
    name: "Bring-up slave 1 system status bits"
    register_type: read
    address: 38
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_modbus

  - platform: modbus_controller
    modbus_controller_id: aurora3_slave_251
    id: bringup_slave_251_system_status_bits
    name: "Bring-up slave 251 system status bits"
    register_type: read
    address: 38
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_modbus

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "ESP IP"
      entity_category: diagnostic
      web_server:
        sorting_group_id: group_diagnostics
    ssid:
      name: "ESP WiFi SSID"
      entity_category: diagnostic
      web_server:
        sorting_group_id: group_diagnostics

  - platform: template
    name: "Firmware profile"
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      return std::string("${firmware_profile}");
    web_server:
      sorting_group_id: group_diagnostics

  - platform: template
    name: "Bring-up status"
    update_interval: 60s
    lambda: |-
      const bool slave_1_ok = !isnan(id(bringup_slave_1_system_status_bits).state);
      const bool slave_251_ok = !isnan(id(bringup_slave_251_system_status_bits).state);
      char buffer[80];

      if (slave_1_ok && slave_251_ok) {
        snprintf(buffer, sizeof(buffer), "Slaves 1 and 251 replied: %u / %u",
                 (unsigned) id(bringup_slave_1_system_status_bits).state,
                 (unsigned) id(bringup_slave_251_system_status_bits).state);
        return std::string(buffer);
      }
      if (slave_1_ok) {
        snprintf(buffer, sizeof(buffer), "Slave 1 replied: status bits %u",
                 (unsigned) id(bringup_slave_1_system_status_bits).state);
        return std::string(buffer);
      }
      if (slave_251_ok) {
        snprintf(buffer, sizeof(buffer), "Slave 251 replied: status bits %u",
                 (unsigned) id(bringup_slave_251_system_status_bits).state);
        return std::string(buffer);
      }
      return std::string("No Modbus reply yet from slave 1 or 251");
    web_server:
      sorting_group_id: group_modbus
