    id: water_delta_t
    name: "Water delta T"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      if (isnan(id(outlet_water_temperature).state) || isnan(id(inlet_water_temperature).state)) {
        return NAN;
      }
      return id(outlet_water_temperature).state - id(inlet_water_temperature).state;
    web_server:
      sorting_group_id: group_temperatures

  - platform: template
    id: estimated_heating_power
    name: "Estimated heating power"
    unit_of_measurement: "kW"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      if (isnan(id(water_flow).state) || isnan(id(water_delta_t).state) || isnan(id(compressor_actual_frequency).state)) {
        return NAN;
      }
      if (id(compressor_actual_frequency).state <= 0.0f || id(water_flow).state <= 0.3f || id(water_delta_t).state <= 0.5f) {
        return 0.0f;
      }
      return 1.163f * id(water_flow).state * id(water_delta_t).state;
    web_server:
      sorting_group_id: group_power

  - platform: template
    id: estimated_cooling_power
    name: "Estimated cooling power"
    unit_of_measurement: "kW"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      if (isnan(id(water_flow).state) || isnan(id(water_delta_t).state) || isnan(id(compressor_actual_frequency).state)) {
        return NAN;
      }
      if (id(compressor_actual_frequency).state <= 0.0f || id(water_flow).state <= 0.3f || id(water_delta_t).state >= -0.5f) {
        return 0.0f;
      }
      return -1.163f * id(water_flow).state * id(water_delta_t).state;
    web_server:
      sorting_group_id: group_power

  - platform: template
    id: estimated_electrical_power
    name: "Estimated electrical power"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      if (!isnan(id(ac_voltage).state) && !isnan(id(ac_current).state) && id(ac_voltage).state > 0.0f && id(ac_current).state > 0.0f) {
        return id(ac_voltage).state * id(ac_current).state;
      }
      return NAN;
    web_server:
      sorting_group_id: group_power

  - platform: template
    name: "Estimated COP"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      const float thermal = id(estimated_heating_power).state + id(estimated_cooling_power).state;
      if (isnan(thermal) || isnan(id(estimated_electrical_power).state) || thermal <= 0.0f || id(estimated_electrical_power).state <= 50.0f) {
        return NAN;
      }
      return thermal / (id(estimated_electrical_power).state / 1000.0f);
    web_server:
      sorting_group_id: group_power

