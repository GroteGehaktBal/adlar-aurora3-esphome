name: Bug report
description: Report a problem with the ESPHome configuration or documentation.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: input
    id: esphome-version
    attributes:
      label: ESPHome version
      placeholder: "2026.5.1"
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs with secrets removed.
      render: text
  - type: textarea
    id: hardware
    attributes:
      label: Hardware
      description: Heat pump model, JÅN module, ESP board and RS485 module.
