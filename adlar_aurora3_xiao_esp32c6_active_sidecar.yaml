---
# Complete active sidecar ESPHome firmware for Adlar Aurora III / JÅN RS485.
#
# This profile is built from the active probe that worked on the shared JÅN bus.
# It uses a custom slow Modbus RTU scheduler instead of ESPHome modbus_controller,
# because shared JÅN bus installations already have existing controller traffic
# and need quiet-window collision avoidance.
#
# Read behavior:
#   - Function 4 for input registers.
#   - Function 3 for holding registers.
#   - One register per request.
#   - Waits for a quiet RS485 window before sending.
#
# Write behavior:
#   - Function 6 single-register writes only.
#   - All write controls are blocked until "Enable write controls" is ON.
#   - Temperature controls use tenths of a degree where the JÅN/Aurora mapping
#     uses raw x10 values.
#
# Tested XY-485 TTL wiring:
#   XIAO D6/TX -> RS485 module TXD
#   XIAO D7/RX -> RS485 module RXD
#   XIAO 3V3   -> RS485 module VCC
#   XIAO GND   -> RS485 module GND/DNG
#
# RS485 side:
#   RS485 A+   -> JÅN A
#   RS485 B-   -> JÅN B
#   RS485 GND  -> JÅN GND

substitutions:
  name: adlar-aurora3
  friendly_name: Adlar Aurora III
  firmware_profile: "active-sidecar 1.0.2 - live electrical watts"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: "Active sidecar Modbus integration for Adlar Aurora III JÅN RS485"
  project:
    name: grotegehaktbal.adlar_aurora3_esphome
    version: "1.0.2-active-sidecar"

dashboard_import:
  package_import_url: github://GroteGehaktBal/adlar-aurora3-esphome/adlar_aurora3_xiao_esp32c6_active_sidecar.yaml@main
  import_full_config: true

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "${friendly_name} fallback"
    password: !secret fallback_ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO
  baud_rate: 0

web_server:
  port: 80
  version: 3
  sorting_groups:
    - id: group_status
      name: Status
      sorting_weight: 10
    - id: group_temperatures
      name: Temperatures
      sorting_weight: 20
    - id: group_refrigerant
      name: Refrigerant Circuit
      sorting_weight: 25
    - id: group_hydraulics
      name: Hydraulics
      sorting_weight: 30
    - id: group_power
      name: Power
      sorting_weight: 40
    - id: group_controls
      name: Controls
      sorting_weight: 80
    - id: group_diagnostics
      name: Diagnostics
      sorting_weight: 90

button:
  - platform: restart
    name: "Restart ESP"
    entity_category: diagnostic

switch:
  - platform: template
    id: active_sidecar_enabled
    name: "Active sidecar reads enabled"
    icon: "mdi:radar"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    web_server:
      sorting_group_id: group_controls

  - platform: template
    id: write_controls_enabled
    name: "Enable write controls"
    icon: "mdi:lock-open-variant"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    web_server:
      sorting_group_id: group_controls

  - platform: template
    name: "Domestic hot water (DHW) mode"
    icon: "mdi:water-boiler"
    lambda: |-
      if (isnan(id(dhw_mode_current_raw).state)) return {};
      return ((uint16_t) id(dhw_mode_current_raw).state) == 1;
    turn_on_action:
      - lambda: |-
          if (!id(write_controls_enabled).state) {
            id(active_sidecar_status).publish_state("write blocked: enable write controls first");
            return;
          }
          id(pending_write_address) = 2102;
          id(pending_write_value) = 1;
          id(pending_write_requested) = true;
          id(active_sidecar_status).publish_state("queued write: domestic hot water mode on");
    turn_off_action:
      - lambda: |-
          if (!id(write_controls_enabled).state) {
            id(active_sidecar_status).publish_state("write blocked: enable write controls first");
            return;
          }
          id(pending_write_address) = 2102;
          id(pending_write_value) = 0;
          id(pending_write_requested) = true;
          id(active_sidecar_status).publish_state("queued write: domestic hot water mode off");
    web_server:
      sorting_group_id: group_controls

globals:
  - id: last_rx_seen_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: outstanding_function
    type: uint8_t
    restore_value: no
    initial_value: "0"

  - id: outstanding_address
    type: uint16_t
    restore_value: no
    initial_value: "0"

  - id: outstanding_write_value
    type: uint16_t
    restore_value: no
    initial_value: "0"

  - id: outstanding_sent_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: read_index
    type: uint8_t
    restore_value: no
    initial_value: "0"

  - id: read_requests
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: read_replies
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: write_requests
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: write_replies
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: modbus_timeouts
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: bus_busy_skips
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: passive_frames_seen
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: ignored_valid_frames
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: last_function
    type: uint16_t
    restore_value: no
    initial_value: "0"

  - id: last_address
    type: uint16_t
    restore_value: no
    initial_value: "0"

  - id: last_raw
    type: uint16_t
    restore_value: no
    initial_value: "0"

  - id: pending_write_requested
    type: bool
    restore_value: no
    initial_value: "false"

  - id: pending_write_address
    type: uint16_t
    restore_value: no
    initial_value: "0"

  - id: pending_write_value
    type: uint16_t
    restore_value: no
    initial_value: "0"

uart:
  id: uart_rs485_sidecar
  tx_pin: D6
  rx_pin: D7
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 2
  rx_buffer_size: 1024
  debug:
    direction: RX
    dummy_receiver: true
    after:
      timeout: 6ms
    sequence:
      - lambda: |-
          if (bytes.size() < 5) {
            return;
          }

          id(last_rx_seen_ms) = millis();

          auto crc16_range = [&](size_t start, size_t length) -> uint16_t {
            uint16_t crc = 0xFFFF;
            for (size_t pos = 0; pos < length; pos++) {
              crc ^= (uint16_t) bytes[start + pos];
              for (uint8_t i = 0; i < 8; i++) {
                if ((crc & 0x0001) != 0) {
                  crc >>= 1;
                  crc ^= 0xA001;
                } else {
                  crc >>= 1;
                }
              }
            }
            return crc;
          };

          auto word_at = [](const std::vector<uint8_t> &data, size_t index) -> uint16_t {
            return ((uint16_t) data[index] << 8) | data[index + 1];
          };

          auto has_valid_crc = [&](size_t start, size_t length) -> bool {
            if (length < 5 || start + length > bytes.size()) {
              return false;
            }
            const uint16_t expected_crc = crc16_range(start, length - 2);
            const uint16_t actual_crc = (uint16_t) bytes[start + length - 2] |
                                        ((uint16_t) bytes[start + length - 1] << 8);
            return expected_crc == actual_crc;
          };

          auto publish_read_value = [](uint8_t function, uint16_t address, uint16_t raw) -> bool {
            auto optional_temperature = [](uint16_t value) -> float {
              const int16_t signed_value = (int16_t) value;
              if (signed_value <= -400 || signed_value >= 1200) {
                return NAN;
              }
              return signed_value * 0.1f;
            };

            if (function == 0x04) {
              switch (address) {
                case 1:
                  id(thermostat_type_raw).publish_state(raw);
                  return true;
                case 2:
                  id(zone_config_raw).publish_state(raw);
                  return true;
                case 7:
                  id(refrigerant_type_raw).publish_state(raw);
                  return true;
                case 9:
                  id(effective_mode_raw).publish_state(raw);
                  return true;
                case 12:
                  id(zone1_heating_max_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 13:
                  id(zone1_heating_min_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 14:
                  id(zone1_dhw_max_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 15:
                  id(zone1_dhw_min_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 30:
                  id(room_temperature_max).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 31:
                  id(room_temperature_min).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 35:
                  id(zone1_terminal_heating_raw).publish_state(raw);
                  return true;
                case 38:
                  id(system_status_bits).publish_state(raw);
                  return true;
                case 39:
                  id(external_heat_request_raw).publish_state(raw);
                  return true;
                case 40:
                  id(room_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 41:
                  id(total_leaving_water_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 42:
                  id(inlet_water_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 43:
                  id(outlet_water_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 44:
                  id(buffer_tank_upper_temperature).publish_state(optional_temperature(raw));
                  return true;
                case 45:
                  id(buffer_tank_lower_temperature).publish_state(optional_temperature(raw));
                  return true;
                case 46:
                  id(dhw_tank_temperature).publish_state(optional_temperature(raw));
                  return true;
                case 47:
                  id(zone2_mixing_station_temperature).publish_state(optional_temperature(raw));
                  return true;
                case 48:
                  id(solar_water_heating_temperature).publish_state(optional_temperature(raw));
                  return true;
                case 49:
                  id(outdoor_unit_coil_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 50:
                  id(ambient_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 51:
                  id(exv_outlet_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 52:
                  id(discharge_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 53:
                  id(suction_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 56:
                  id(target_outlet_temperature).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 60:
                  id(inlet_water_pressure).publish_state((raw) * 0.1f);
                  return true;
                case 61:
                  id(outlet_water_pressure).publish_state((raw) * 0.1f);
                  return true;
                case 62:
                  id(pump_pwm_output).publish_state(raw);
                  return true;
                case 63:
                  id(pump_pwm_feedback).publish_state(raw);
                  return true;
                case 64:
                  id(water_flow).publish_state((raw) * 0.1f);
                  return true;
                case 66:
                  id(climate_curve_cooling_set).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 67:
                  id(climate_curve_heating_set).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 70:
                  id(eev_opening).publish_state(raw);
                  return true;
                case 72:
                  id(fan_speed).publish_state(raw);
                  return true;
                case 74:
                  id(ac_voltage).publish_state(raw);
                  return true;
                case 75:
                  id(ac_current).publish_state((raw) * 0.1f);
                  return true;
                case 76:
                  id(dc_bus_voltage).publish_state(raw);
                  return true;
                case 77:
                  id(compressor_current).publish_state((raw) * 0.1f);
                  return true;
                case 78:
                  id(compressor_target_frequency).publish_state(raw);
                  return true;
                case 79:
                  id(compressor_actual_frequency).publish_state(raw);
                  return true;
                case 80:
                  id(main_water_pump_status_raw).publish_state(raw);
                  return true;
                case 81:
                  id(four_way_valve_status_raw).publish_state(raw);
                  return true;
                case 86:
                  id(high_pressure).publish_state(raw);
                  return true;
                case 87:
                  id(low_pressure).publish_state(raw);
                  return true;
                case 90:
                  id(error_e01_e16).publish_state(raw);
                  return true;
                case 91:
                  id(error_e17_e32).publish_state(raw);
                  return true;
                case 96:
                  id(error_p01_p16).publish_state(raw);
                  return true;
                case 97:
                  id(error_p17_p32).publish_state(raw);
                  return true;
                case 101:
                  id(target_operation_mode_raw).publish_state(raw);
                  return true;
                case 103:
                  id(actual_operation_mode_raw).publish_state(raw);
                  return true;
                default:
                  return false;
              }
            }

            if (function == 0x03) {
              switch (address) {
                case 2100:
                  id(hvac_mode_current_raw).publish_state(raw);
                  return true;
                case 2101:
                  id(zone_control_current_raw).publish_state(raw);
                  return true;
                case 2102:
                  id(dhw_mode_current_raw).publish_state(raw);
                  return true;
                case 2103:
                  id(function_a_raw).publish_state(raw);
                  return true;
                case 2105:
                  id(dhw_setpoint_current).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 2107:
                  id(zone1_heating_setpoint_current).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 2114:
                  id(room_setpoint_current).publish_state(((int16_t) raw) * 0.1f);
                  return true;
                case 6035:
                  id(observed_holding_6035_raw).publish_state(raw);
                  return true;
                default:
                  return false;
              }
            }

            return false;
          };

          auto process_frame = [&](const std::vector<uint8_t> &frame) {
            const uint8_t slave = frame[0];
            const uint8_t function = frame[1];
            char message[144];

            if (slave != 1) {
              id(ignored_valid_frames) += 1;
              return;
            }

            if ((function == 0x03 || function == 0x04) && frame.size() == 8) {
              id(passive_frames_seen) += 1;
              snprintf(message, sizeof(message), "passive request seen slave %u fc %u addr %u",
                       slave, function, word_at(frame, 2));
              id(active_sidecar_last_frame).publish_state(message);
              return;
            }

            if (function == 0x06 && frame.size() == 8) {
              const uint16_t address = word_at(frame, 2);
              const uint16_t raw = word_at(frame, 4);
              const uint32_t age_ms = millis() - id(outstanding_sent_ms);
              const bool is_our_write_reply = id(outstanding_function) == 0x06 &&
                                              address == id(outstanding_address) &&
                                              raw == id(outstanding_write_value) &&
                                              age_ms <= 1200;
              if (!is_our_write_reply) {
                id(passive_frames_seen) += 1;
                return;
              }

              id(outstanding_function) = 0;
              id(write_replies) += 1;
              id(last_function) = function;
              id(last_address) = address;
              id(last_raw) = raw;
              snprintf(message, sizeof(message), "write acknowledged slave %u addr %u raw %u age %u ms",
                       slave, address, raw, (unsigned) age_ms);
              id(active_sidecar_status).publish_state(message);
              id(active_sidecar_last_frame).publish_state(message);
              publish_read_value(0x03, address, raw);
              ESP_LOGI("active_sidecar", "%s", message);
              return;
            }

            if ((function != 0x03 && function != 0x04) || frame.size() < 7) {
              id(ignored_valid_frames) += 1;
              return;
            }

            const uint8_t byte_count = frame[2];
            if (frame.size() != (size_t) byte_count + 5 || byte_count < 2) {
              id(ignored_valid_frames) += 1;
              return;
            }

            const uint16_t raw = word_at(frame, 3);
            const uint32_t age_ms = millis() - id(outstanding_sent_ms);
            const bool is_our_read_reply = function == id(outstanding_function) &&
                                           id(outstanding_function) != 0 &&
                                           age_ms <= 1200;

            if (!is_our_read_reply) {
              id(passive_frames_seen) += 1;
              return;
            }

            const uint16_t address = id(outstanding_address);
            id(outstanding_function) = 0;
            id(read_replies) += 1;
            id(last_function) = function;
            id(last_address) = address;
            id(last_raw) = raw;

            snprintf(message, sizeof(message), "reply slave %u fc %u addr %u raw %u age %u ms",
                     slave, function, address, raw, (unsigned) age_ms);
            id(active_sidecar_last_frame).publish_state(message);

            if (publish_read_value(function, address, raw)) {
              snprintf(message, sizeof(message), "published fc %u addr %u raw %u", function, address, raw);
              id(active_sidecar_status).publish_state(message);
              ESP_LOGI("active_sidecar", "%s", message);
            } else {
              snprintf(message, sizeof(message), "reply fc %u addr %u raw %u has no mapped entity", function, address, raw);
              id(active_sidecar_status).publish_state(message);
              ESP_LOGI("active_sidecar", "%s", message);
            }
          };

          size_t offset = 0;
          while (offset + 5 <= bytes.size()) {
            const uint8_t function = bytes[offset + 1];
            bool parsed = false;

            if ((function == 0x03 || function == 0x04) && offset + 5 <= bytes.size()) {
              const uint8_t byte_count = bytes[offset + 2];
              const size_t response_length = (size_t) byte_count + 5;
              if (byte_count > 0 &&
                  byte_count <= 240 &&
                  offset + response_length <= bytes.size() &&
                  has_valid_crc(offset, response_length)) {
                std::vector<uint8_t> frame(bytes.begin() + offset,
                                           bytes.begin() + offset + response_length);
                process_frame(frame);
                offset += response_length;
                parsed = true;
              }
            }

            if (!parsed &&
                (function == 0x03 || function == 0x04 || function == 0x06) &&
                offset + 8 <= bytes.size() &&
                has_valid_crc(offset, 8)) {
              std::vector<uint8_t> frame(bytes.begin() + offset, bytes.begin() + offset + 8);
              process_frame(frame);
              offset += 8;
              parsed = true;
            }

            if (!parsed) {
              offset += 1;
            }
          }

interval:
  - interval: 2s
    then:
      - lambda: |-
          if (!id(active_sidecar_enabled).state) {
            id(active_sidecar_status).publish_state("active sidecar disabled");
            return;
          }

          if (!id(write_controls_enabled).state && id(pending_write_requested)) {
            id(pending_write_requested) = false;
            id(active_sidecar_status).publish_state("discarded queued write because write controls are disabled");
          }

          const uint32_t now = millis();

          if (id(outstanding_function) != 0) {
            const uint32_t age_ms = now - id(outstanding_sent_ms);
            if (age_ms > 1500) {
              id(modbus_timeouts) += 1;
              char message[112];
              snprintf(message, sizeof(message), "timeout fc %u addr %u after %u ms",
                       id(outstanding_function), id(outstanding_address), (unsigned) age_ms);
              id(active_sidecar_status).publish_state(message);
              ESP_LOGW("active_sidecar", "%s", message);
              id(outstanding_function) = 0;
            }
            return;
          }

          if (id(last_rx_seen_ms) != 0 && now - id(last_rx_seen_ms) < 350) {
            id(bus_busy_skips) += 1;
            id(active_sidecar_status).publish_state("waiting for quiet bus before sending");
            return;
          }

          struct ReadRegister {
            uint8_t function;
            uint16_t address;
          };

          const ReadRegister reads[] = {
            {0x04, 1},
            {0x04, 2},
            {0x04, 7},
            {0x04, 9},
            {0x04, 12},
            {0x04, 13},
            {0x04, 14},
            {0x04, 15},
            {0x04, 30},
            {0x04, 31},
            {0x04, 35},
            {0x04, 38},
            {0x04, 39},
            {0x04, 40},
            {0x04, 41},
            {0x04, 42},
            {0x04, 43},
            {0x04, 44},
            {0x04, 45},
            {0x04, 46},
            {0x04, 47},
            {0x04, 48},
            {0x04, 49},
            {0x04, 50},
            {0x04, 51},
            {0x04, 52},
            {0x04, 53},
            {0x04, 56},
            {0x04, 60},
            {0x04, 61},
            {0x04, 62},
            {0x04, 63},
            {0x04, 64},
            {0x04, 66},
            {0x04, 67},
            {0x04, 70},
            {0x04, 72},
            {0x04, 74},
            {0x04, 75},
            {0x04, 76},
            {0x04, 77},
            {0x04, 78},
            {0x04, 79},
            {0x04, 80},
            {0x04, 81},
            {0x04, 86},
            {0x04, 87},
            {0x04, 90},
            {0x04, 91},
            {0x04, 96},
            {0x04, 97},
            {0x04, 101},
            {0x04, 103},
            {0x03, 2100},
            {0x03, 2101},
            {0x03, 2102},
            {0x03, 2103},
            {0x03, 2105},
            {0x03, 2107},
            {0x03, 2114},
            {0x03, 6035},
          };

          uint8_t function = 0x04;
          uint16_t address = 0;
          uint16_t value = 0;
          bool is_write = false;

          if (id(pending_write_requested) && id(write_controls_enabled).state) {
            function = 0x06;
            address = id(pending_write_address);
            value = id(pending_write_value);
            is_write = true;
            id(pending_write_requested) = false;
          } else {
            const size_t read_count = sizeof(reads) / sizeof(reads[0]);
            const ReadRegister reg = reads[id(read_index) % read_count];
            id(read_index) = (id(read_index) + 1) % read_count;
            function = reg.function;
            address = reg.address;
            value = 1;
          }

          std::vector<uint8_t> frame = {
            0x01,
            function,
            (uint8_t) (address >> 8),
            (uint8_t) (address & 0xFF),
            (uint8_t) (value >> 8),
            (uint8_t) (value & 0xFF),
            0x00,
            0x00,
          };

          uint16_t crc = 0xFFFF;
          for (size_t pos = 0; pos < 6; pos++) {
            crc ^= (uint16_t) frame[pos];
            for (uint8_t i = 0; i < 8; i++) {
              if ((crc & 0x0001) != 0) {
                crc >>= 1;
                crc ^= 0xA001;
              } else {
                crc >>= 1;
              }
            }
          }
          frame[6] = (uint8_t) (crc & 0xFF);
          frame[7] = (uint8_t) (crc >> 8);

          id(outstanding_function) = function;
          id(outstanding_address) = address;
          id(outstanding_write_value) = value;
          id(outstanding_sent_ms) = now;
          id(last_function) = function;
          id(last_address) = address;

          if (is_write) {
            id(write_requests) += 1;
          } else {
            id(read_requests) += 1;
          }

          id(uart_rs485_sidecar).write_array(frame.data(), frame.size());

          char message[112];
          if (is_write) {
            snprintf(message, sizeof(message), "sent write slave 1 addr %u raw %u", address, value);
          } else {
            snprintf(message, sizeof(message), "sent read slave 1 fc %u addr %u", function, address);
          }
          id(active_sidecar_status).publish_state(message);
          id(active_sidecar_last_frame).publish_state(message);
          ESP_LOGI("active_sidecar", "%s", message);

