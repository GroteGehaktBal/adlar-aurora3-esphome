---
# RS485 transceiver link test firmware for the Seeed Studio XIAO ESP32C6.
#
# Purpose:
# - Test the XIAO plus RS485 transceiver board without the JÅN module.
# - Send visible bytes over RS485 every 5 seconds.
# - Log both transmitted and received UART bytes through ESPHome.
#
# Test wiring:
# - Keep the RS485 module connected to the XIAO:
#   XIAO D6/TX -> module RXD, XIAO D7/RX -> module TXD, 3V3 -> VCC, GND -> GND/DNG.
# - Disconnect the module A/B/GND wires from the JÅN module.
# - Connect module A/B/GND to a known-good USB-RS485 adapter or a second RS485 transceiver.
# - Use 9600 baud, 8 data bits, no parity, 2 stop bits on the other side.
# - Do not short RS485 A to B as a loopback test.

substitutions:
  name: adlar-aurora3
  friendly_name: Adlar Aurora III
  firmware_profile: "rs485-link-test 0.6.0 - 9600 8N2"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: "XIAO ESP32C6 RS485 transceiver link test"
  project:
    name: grotegehaktbal.adlar_aurora3_esphome
    version: "0.6.0-rs485-link-test"

dashboard_import:
  package_import_url: github://GroteGehaktBal/adlar-aurora3-esphome/adlar_aurora3_xiao_esp32c6_rs485_link_test.yaml@main
  import_full_config: true

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "${friendly_name} fallback"
    password: !secret fallback_ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: DEBUG
  baud_rate: 0

web_server:
  port: 80
  version: 3
  sorting_groups:
    - id: group_diagnostics
      name: Diagnostics
      sorting_weight: 10
    - id: group_test
      name: RS485 Link Test
      sorting_weight: 20

button:
  - platform: restart
    name: "Restart ESP"
    entity_category: diagnostic

uart:
  id: uart_rs485_test
  tx_pin: D6
  rx_pin: D7
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 2
  rx_buffer_size: 512
  debug:
    direction: BOTH
    dummy_receiver: true
    after:
      bytes: 10
      timeout: 50ms

interval:
  - interval: 5s
    then:
      - uart.write:
          id: uart_rs485_test
          data: [0x41, 0x44, 0x4C, 0x41, 0x52, 0x34, 0x38, 0x35, 0x0D, 0x0A]

binary_sensor:
  - platform: status
    name: "ESP online"
    entity_category: diagnostic

sensor:
  - platform: wifi_signal
    name: "ESP WiFi signal"
    update_interval: 60s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics

  - platform: uptime
    name: "ESP uptime"
    update_interval: 60s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "ESP IP"
      entity_category: diagnostic
      web_server:
        sorting_group_id: group_diagnostics
    ssid:
      name: "ESP WiFi SSID"
      entity_category: diagnostic
      web_server:
        sorting_group_id: group_diagnostics

  - platform: template
    name: "Firmware profile"
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      return std::string("${firmware_profile}");
    web_server:
      sorting_group_id: group_diagnostics

  - platform: template
    name: "RS485 link test status"
    update_interval: 60s
    lambda: |-
      return std::string("Sends ADLAR485 every 5s. Use a USB-RS485 adapter or second RS485 module as the other side.");
    web_server:
      sorting_group_id: group_test
