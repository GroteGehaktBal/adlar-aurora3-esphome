---
# ESPHome configuration for an Adlar Aurora III / Adlar Castra Aurora III Pro
# heat pump through the JÅN module RS485 Modbus RTU terminals.
#
# Legacy/reference profile:
# For the tested shared JÅN bus, use
# adlar_aurora3_xiao_esp32c6_active_sidecar.yaml instead. This older profile
# uses ESPHome modbus_controller and is kept for comparison with community
# mappings.
#
# This profile follows the Aurora III community mapping: 9600 8N2, input
# registers for live telemetry, and holding registers for the limited controls.
#
# Safety note:
# Start with monitoring only. Write entities are disabled by default because the
# JÅN module can overwrite setpoints and because Modbus RTU has no bus arbitration.

substitutions:
  name: adlar-aurora3
  friendly_name: Adlar Aurora III
  modbus_slave_id: "1"
  modbus_update_interval: 60s
  modbus_command_throttle: 750ms
  modbus_send_wait_time: 500ms

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: "Adlar Aurora III / SolarEast R290 through JÅN module RS485 Modbus RTU on Seeed Studio XIAO ESP32C6"
  project:
    name: grotegehaktbal.adlar_aurora3_esphome
    version: "0.2.0"

dashboard_import:
  package_import_url: github://GroteGehaktBal/adlar-aurora3-esphome/adlar_aurora3_xiao_esp32c6.yaml@main
  import_full_config: true

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "${friendly_name} fallback"
    password: !secret fallback_ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO
  baud_rate: 0

web_server:
  port: 80
  version: 3
  sorting_groups:
    - id: group_status
      name: Status
      sorting_weight: 10
    - id: group_temperatures
      name: Temperatures
      sorting_weight: 20
    - id: group_hydraulics
      name: Hydraulics
      sorting_weight: 30
    - id: group_power
      name: Power
      sorting_weight: 40
    - id: group_controls
      name: Controls
      sorting_weight: 80
    - id: group_diagnostics
      name: Diagnostics
      sorting_weight: 90

button:
  - platform: restart
    name: "Restart ESP"
    entity_category: diagnostic

uart:
  id: uart_rs485
  tx_pin: D6
  rx_pin: D7
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 2

modbus:
  id: modbus_rs485
  uart_id: uart_rs485
  # The tested XY-485-style module has automatic RS485 direction control.
  # For manual-direction MAX485 modules, wire DE + /RE to a GPIO and set:
  # flow_control_pin: D2
  send_wait_time: ${modbus_send_wait_time}

modbus_controller:
  - id: aurora3
    modbus_id: modbus_rs485
    address: ${modbus_slave_id}
    command_throttle: ${modbus_command_throttle}
    setup_priority: -10
    update_interval: ${modbus_update_interval}

binary_sensor:
  - platform: status
    name: "ESP online"
    entity_category: diagnostic

  - platform: template
    name: "Heat pump oil return active"
    lambda: |-
      if (isnan(id(system_status_bits).state)) return {};
      return ((uint16_t) id(system_status_bits).state & 0x0001) != 0;
    device_class: running
    web_server:
      sorting_group_id: group_status

  - platform: template
    name: "Heat pump defrost active"
    lambda: |-
      if (isnan(id(system_status_bits).state)) return {};
      return ((uint16_t) id(system_status_bits).state & 0x0002) != 0;
    device_class: running
    web_server:
      sorting_group_id: group_status

  - platform: template
    name: "Heat pump anti-freezing active"
    lambda: |-
      if (isnan(id(system_status_bits).state)) return {};
      return ((uint16_t) id(system_status_bits).state & 0x0004) != 0;
    device_class: running
    web_server:
      sorting_group_id: group_status

  - platform: template
    name: "Heat pump compressor running"
    lambda: |-
      if (isnan(id(compressor_actual_frequency).state)) return {};
      return id(compressor_actual_frequency).state > 0.0f;
    device_class: running
    web_server:
      sorting_group_id: group_status

  - platform: template
    name: "Heat pump main water pump on"
    lambda: |-
      if (isnan(id(main_water_pump_status_raw).state)) return {};
      return ((uint16_t) id(main_water_pump_status_raw).state) == 1;
    device_class: running
    web_server:
      sorting_group_id: group_status

  - platform: template
    name: "Heat pump cooling cycle valve"
    lambda: |-
      if (isnan(id(four_way_valve_status_raw).state)) return {};
      return ((uint16_t) id(four_way_valve_status_raw).state) == 1;
    web_server:
      sorting_group_id: group_status

  - platform: template
    name: "Heat pump E-error active"
    lambda: |-
      if (isnan(id(error_e01_e16).state) || isnan(id(error_e17_e32).state)) return {};
      return id(error_e01_e16).state > 0.0f || id(error_e17_e32).state > 0.0f;
    device_class: problem
    web_server:
      sorting_group_id: group_status

  - platform: template
    name: "Heat pump P-error active"
    lambda: |-
      if (isnan(id(error_p01_p16).state) || isnan(id(error_p17_p32).state)) return {};
      return id(error_p01_p16).state > 0.0f || id(error_p17_p32).state > 0.0f;
    device_class: problem
    web_server:
      sorting_group_id: group_status

