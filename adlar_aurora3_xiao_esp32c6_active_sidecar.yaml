select:
  - platform: template
    name: "HVAC mode"
    id: hvac_mode_control
    options:
      - "Cooling"
      - "Heating"
      - "Auto"
    lambda: |-
      if (isnan(id(hvac_mode_current_raw).state)) return {};
      const uint16_t mode = (uint16_t) id(hvac_mode_current_raw).state;
      if (mode == 1) return std::string("Cooling");
      if (mode == 2) return std::string("Heating");
      if (mode == 4) return std::string("Auto");
      return {};
    set_action:
      - lambda: |-
          if (!id(write_controls_enabled).state) {
            id(active_sidecar_status).publish_state("write blocked: enable write controls first");
            return;
          }
          uint16_t raw = 0;
          if (x == "Cooling") raw = 1;
          if (x == "Heating") raw = 2;
          if (x == "Auto") raw = 4;
          if (raw == 0) return;
          id(pending_write_address) = 2100;
          id(pending_write_value) = raw;
          id(pending_write_requested) = true;
          id(active_sidecar_status).publish_state("queued write: HVAC mode");
    web_server:
      sorting_group_id: group_controls

  - platform: template
    name: "Zone control"
    id: zone_control
    options:
      - "All off"
      - "Zone 1 on"
      - "Zone 2 on"
      - "All zones on"
    lambda: |-
      if (isnan(id(zone_control_current_raw).state)) return {};
      const uint16_t mode = (uint16_t) id(zone_control_current_raw).state;
      if (mode == 0) return std::string("All off");
      if (mode == 1) return std::string("Zone 1 on");
      if (mode == 2) return std::string("Zone 2 on");
      if (mode == 3) return std::string("All zones on");
      return {};
    set_action:
      - lambda: |-
          if (!id(write_controls_enabled).state) {
            id(active_sidecar_status).publish_state("write blocked: enable write controls first");
            return;
          }
          uint16_t raw = 65535;
          if (x == "All off") raw = 0;
          if (x == "Zone 1 on") raw = 1;
          if (x == "Zone 2 on") raw = 2;
          if (x == "All zones on") raw = 3;
          if (raw == 65535) return;
          id(pending_write_address) = 2101;
          id(pending_write_value) = raw;
          id(pending_write_requested) = true;
          id(active_sidecar_status).publish_state("queued write: zone control");
    web_server:
      sorting_group_id: group_controls

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "ESP IP"
      entity_category: diagnostic
      web_server:
        sorting_group_id: group_diagnostics
    ssid:
      name: "ESP WiFi SSID"
      entity_category: diagnostic
      web_server:
        sorting_group_id: group_diagnostics

  - platform: template
    name: "Firmware profile"
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      return std::string("${firmware_profile}");
    web_server:
      sorting_group_id: group_diagnostics

  - platform: template
    id: active_sidecar_status
    name: "Active sidecar status"
    update_interval: never
    web_server:
      sorting_group_id: group_diagnostics

  - platform: template
    id: active_sidecar_last_frame
    name: "Active sidecar last frame"
    update_interval: never
    web_server:
      sorting_group_id: group_diagnostics

  - platform: template
    name: "Heat pump status text"
    update_interval: 10s
    lambda: |-
      if (isnan(id(system_status_bits).state)) {
        return std::string("No Modbus data");
      }
      const uint16_t status = (uint16_t) id(system_status_bits).state;
      const bool oil = status & 0x0001;
      const bool defrost = status & 0x0002;
      const bool anti_freeze = status & 0x0004;
      const bool disinfection = status & 0x0010;
      const bool ambient_block = status & 0x0800;
      const bool compressor = !isnan(id(compressor_actual_frequency).state) && id(compressor_actual_frequency).state > 0.0f;
      const bool pump = !isnan(id(main_water_pump_status_raw).state) && ((uint16_t) id(main_water_pump_status_raw).state) == 1;

      if (defrost) return std::string("Defrosting");
      if (oil) return std::string("Oil return");
      if (anti_freeze) return std::string("Anti-freezing");
      if (disinfection) return std::string("Disinfection");
      if (ambient_block) return std::string("Ambient temperature block");
      if (compressor && !isnan(id(water_delta_t).state) && id(water_delta_t).state > 0.5f) return std::string("Heating");
      if (compressor && !isnan(id(water_delta_t).state) && id(water_delta_t).state < -0.5f) return std::string("Cooling");
      if (compressor) return std::string("Compressor running");
      if (pump) return std::string("Pump circulation");
      return std::string("Idle");
    web_server:
      sorting_group_id: group_status

  - platform: template
    name: "HVAC mode text"
    update_interval: 10s
    lambda: |-
      if (isnan(id(hvac_mode_current_raw).state)) {
        return std::string("No Modbus data");
      }
      const uint16_t mode = (uint16_t) id(hvac_mode_current_raw).state;
      if (mode == 1) return std::string("Cooling");
      if (mode == 2) return std::string("Heating");
      if (mode == 4) return std::string("Auto");
      char buffer[32];
      snprintf(buffer, sizeof(buffer), "Unknown (%u)", mode);
      return std::string(buffer);
    web_server:
      sorting_group_id: group_status

  - platform: template
    name: "Zone control text"
    update_interval: 10s
    lambda: |-
      if (isnan(id(zone_control_current_raw).state)) {
        return std::string("No Modbus data");
      }
      const uint16_t mode = (uint16_t) id(zone_control_current_raw).state;
      if (mode == 0) return std::string("All off");
      if (mode == 1) return std::string("Zone 1 on");
      if (mode == 2) return std::string("Zone 2 on");
      if (mode == 3) return std::string("All zones on");
      char buffer[32];
      snprintf(buffer, sizeof(buffer), "Unknown (%u)", mode);
      return std::string(buffer);
    web_server:
      sorting_group_id: group_status

  - platform: template
    name: "Zone configuration text"
    update_interval: 10s
    lambda: |-
      if (isnan(id(zone_config_raw).state)) {
        return std::string("No Modbus data");
      }
      const uint16_t config = (uint16_t) id(zone_config_raw).state;
      if (config == 0) return std::string("Single-zone system");
      if (config == 1) return std::string("Two-zone system");
      char buffer[40];
      snprintf(buffer, sizeof(buffer), "Unknown zone config (%u)", config);
      return std::string(buffer);
    web_server:
      sorting_group_id: group_status

  - platform: template
    name: "Weather compensation text"
    update_interval: 10s
    lambda: |-
      if (isnan(id(climate_curve_heating_set).state) && isnan(id(target_outlet_temperature).state)) {
        return std::string("No Modbus data");
      }
      char buffer[112];
      if (!isnan(id(climate_curve_heating_set).state) && !isnan(id(target_outlet_temperature).state)) {
        snprintf(buffer, sizeof(buffer), "JÅN curve %.1f °C, target outlet %.1f °C",
                 id(climate_curve_heating_set).state, id(target_outlet_temperature).state);
        return std::string(buffer);
      }
      if (!isnan(id(climate_curve_heating_set).state)) {
        snprintf(buffer, sizeof(buffer), "JÅN curve %.1f °C", id(climate_curve_heating_set).state);
        return std::string(buffer);
      }
      snprintf(buffer, sizeof(buffer), "Target outlet %.1f °C", id(target_outlet_temperature).state);
      return std::string(buffer);
    web_server:
      sorting_group_id: group_controls

  - platform: template
    name: "Heat pump fault summary"
    update_interval: 10s
    lambda: |-
      if (isnan(id(error_e01_e16).state) || isnan(id(error_e17_e32).state) || isnan(id(error_p01_p16).state) || isnan(id(error_p17_p32).state)) {
        return std::string("No Modbus data");
      }
      if (id(error_e01_e16).state == 0 && id(error_e17_e32).state == 0 && id(error_p01_p16).state == 0 && id(error_p17_p32).state == 0) {
        return std::string("No active error bits");
      }
      char buffer[112];
      snprintf(buffer, sizeof(buffer), "E01-E16=%u, E17-E32=%u, P01-P16=%u, P17-P32=%u",
               (unsigned) id(error_e01_e16).state,
               (unsigned) id(error_e17_e32).state,
               (unsigned) id(error_p01_p16).state,
               (unsigned) id(error_p17_p32).state);
      return std::string(buffer);
    web_server:
      sorting_group_id: group_status
